<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses — Codingua Manager</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="main" id="app">
    <div class="content">
      <div class="page-header">
        <div class="page-header-info">
          <h1>Courses</h1>
          <p>// manage your academy curriculum</p>
        </div>
        <button class="btn btn-primary" id="btnAddCourse">＋ Add Course</button>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">All Courses</span>
          <div class="search-wrap" style="max-width:260px">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search courses...">
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Course</th>
                <th>Description</th>
                <th>Price</th>
                <th>Duration</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="coursesTbody">
              <tr class="loading-row"><td colspan="6"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay" id="courseModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Add New Course</span>
        <button class="modal-close">✕</button>
      </div>
      <form id="courseForm">
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Course Name *</label>
              <input type="text" class="form-control" id="fName" required placeholder="e.g. Python Fundamentals">
            </div>
            <div class="form-group">
              <label class="form-label">Course Code</label>
              <input type="text" class="form-control" id="fCode" placeholder="e.g. PY-101">
            </div>
            <div class="form-group full">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="fDescription" placeholder="Course description..."></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Price (EGP) *</label>
              <input type="number" class="form-control" id="fPrice" required placeholder="0" min="0">
            </div>
            <div class="form-group">
              <label class="form-label">Duration</label>
              <input type="text" class="form-control" id="fDuration" placeholder="e.g. 3 months / 24 hours">
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-control" id="fStatus">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="coming_soon">Coming Soon</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary modal-close">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Save Course</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./courses.js"></script>
</body>
</html>
